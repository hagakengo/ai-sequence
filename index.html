<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI図解メーカー</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        body { padding: 40px; font-family: sans-serif; background: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 10px; }
        input { width: 70%; padding: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        #mermaid-graph { margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>図解生成</h1>
        <input type="text" id="userInput" placeholder="例：ログイン処理">
        <button onclick="send()">生成</button>
        <div id="output-text"></div>
        <div id="mermaid-graph"></div>
    </div>
    <script>mermaid.initialize({ startOnLoad: false });</script>
    <script src="script.js"></script>
</body>
</html>
