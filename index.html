<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMツール</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; background: #f0f2f5; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { width: 90%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; }
        #output { text-align: left; background: white; padding: 15px; margin-top: 20px; border-radius: 8px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>⚙️ 設計図作成くん</h2>
    <input type="text" id="userInput" placeholder="例：ログイン機能の設計">
    <button onclick="send()">生成する</button>
    <div id="output">ここに結果が出ます</div>
    <script>
        async function send() {
            const input = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            output.innerText = "生成中...";
            const res = await fetch('/api', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({input})
            });
            const data = await res.json();
            output.innerText = data.content;
        }
    </script>
</body>
</html>
