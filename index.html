<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>AI図解スタジオ</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .main { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        #mermaid-graph { margin: 20px 0; border: 1px solid #ccc; padding: 10px; min-height: 100px; }
    </style>
</head>
<body>
    <div class="main">
        <h1>AI図解スタジオ</h1>
        <input type="text" id="userInput" style="width: 70%; padding: 10px;">
        <button onclick="send()">生成</button>
        <div class="controls">
            <button onclick="changeTheme('default')">デフォルト</button>
            <button onclick="changeTheme('forest')">フォレスト</button>
            <button onclick="changeTheme('dark')">ダーク</button>
            <button onclick="downloadPNG()">PNGダウンロード</button>
        </div>
        <div id="mermaid-graph"></div>
        <h3>履歴</h3>
        <ul id="history-list"></ul>
    </div>
    <script>
        mermaid.initialize({ startOnLoad: false });
    </script>
    <script src="script.js"></script>
</body>
</html>
