<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMアシスタント</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        input { width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; }
        #output { background: white; padding: 15px; margin-top: 20px; border-radius: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>⚙️ 設計図作成くん</h2>
    <input type="text" id="userInput" placeholder="例：ログイン機能の設計">
    <button onclick="send()">設計図を生成する</button>
    <div id="output">ここに結果が出ます</div>

    <script>
        async function send() {
            const input = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            output.innerText = "生成中...";
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({input})
            });
            const data = await res.json();
            output.innerText = data.content;
        }
    </script>
</body>
</html>
